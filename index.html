        <h2 id="hwdez的第一篇博客"><a href="#hwdez的第一篇博客" class="headerlink" title="hwdez的第一篇博客"></a>hwdez的第一篇博客</h2><p><strong>这是我第一篇在Github发布的博客。以后我将不定时发布博客，在博客上记录平时学习的以及思考的内容。</strong></p>

<h2 id="使用if语句用BMI指数判断一个成年人的身材"><a href="#使用if语句用BMI指数判断一个成年人的身材" class="headerlink" title="使用if语句用BMI指数判断一个成年人的身材"></a>使用if语句用BMI指数判断一个成年人的身材</h2><figure class="highlight c"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#<span class="keyword">define</span> _CRT_SECURE_NO_WARNINGS 1</span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span><span class="string">&lt;math.h&gt;</span></span></span><br><span class="line"><span class="type">int</span> <span class="title function_">main</span><span class="params">()</span> </span><br><span class="line">&#123;</span><br><span class="line">	<span class="type">float</span> w, h, BMI;</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;请按顺序输入体重(kg),身高(m)\n&quot;</span>);</span><br><span class="line">	<span class="built_in">scanf</span> (<span class="string">&quot;%f %f&quot;</span>, &amp;w,&amp;h);</span><br><span class="line">	BMI = w/(h*h);</span><br><span class="line">	<span class="built_in">printf</span>(<span class="string">&quot;BMI指数为：%.2f\n&quot;</span>, BMI);</span><br><span class="line">	<span class="keyword">if</span> (BMI &lt; <span class="number">18.5</span>)<span class="built_in">printf</span>(<span class="string">&quot;偏轻，需要尝试增重&quot;</span>);</span><br><span class="line">	<span class="keyword">else</span> <span class="keyword">if</span> (BMI &lt; <span class="number">24</span>)<span class="built_in">printf</span>(<span class="string">&quot;正常，继续保持&quot;</span>);</span><br><span class="line">	<span class="keyword">else</span> <span class="keyword">if</span> (BMI &lt; <span class="number">28</span>)<span class="built_in">printf</span>(<span class="string">&quot;偏重，增加锻炼&quot;</span>);</span><br><span class="line">	<span class="keyword">else</span> <span class="keyword">if</span> (<span class="string">&quot;超重，需要减肥了&quot;</span>);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>  通过BMI我们可以更加科学、精确地判断自己的身材情况并作出行动。</p>
